# Tracks this integration's progress against Home Assistant's integration
# quality scale: https://developers.home-assistant.io/docs/core/integration-quality-scale/
#
# Bronze is met except for `brands`, which requires an external PR to
# home-assistant/brands (see CONTRIBUTING.md) that this repo doesn't control.
# manifest.json declares "quality_scale": "bronze" with that gap documented here.
rules:
  # Bronze
  action-setup:
    status: done
    comment: Services are registered in async_setup.
  appropriate-polling:
    status: done
    comment: Realtime coordinator polls every 60s, statistics every 5min.
  brands:
    status: todo
    comment: Brand assets exist in custom_components/hanchuess/brand/ but still need to be submitted to home-assistant/brands (see CONTRIBUTING.md).
  common-modules:
    status: done
    comment: Shared logic lives in api.py and coordinator.py.
  config-flow-test-coverage:
    status: done
    comment: tests/test_config_flow.py covers success, auth failure, no-devices, already-configured abort, reauth, import, and options flows.
  config-flow:
    status: done
  dependency-transparency:
    status: done
    comment: No third-party requirements; uses HA-provided aiohttp.
  docs-actions:
    status: done
    comment: README.md documents both services, matching services.yaml.
  docs-high-level-description:
    status: done
  docs-installation-instructions:
    status: done
  docs-removal-instructions:
    status: done
    comment: README.md has a "Removing the integration" section.
  entity-event-setup:
    status: done
  entity-unique-id:
    status: done
  has-entity-name:
    status: done
    comment: All entities set _attr_has_entity_name = True.
  runtime-data:
    status: done
    comment: Per-entry state is stored in entry.runtime_data (HanchuessData).
  test-before-configure:
    status: done
    comment: Config flow validates login and device list before creating the entry.
  test-before-setup:
    status: done
    comment: async_config_entry_first_refresh raises on failure.
  unique-config-entry:
    status: done
    comment: Unique id is the device serial number.

  # Silver
  action-exceptions:
    status: todo
  config-entry-unloading:
    status: done
    comment: async_unload_entry unloads platforms; entry.runtime_data is cleared automatically by Home Assistant.
  docs-configuration-parameters:
    status: todo
  docs-installation-parameters:
    status: todo
  entity-unavailable:
    status: todo
  integration-owner:
    status: done
  log-when-unavailable:
    status: todo
  parallel-updates:
    status: todo
  reauthentication-flow:
    status: done
    comment: Reauth flow handled in config_flow.py on token expiry.
  test-coverage:
    status: todo

  # Gold
  devices:
    status: done
    comment: Each entry registers one device via DeviceInfo identifiers.
  diagnostics:
    status: done
  discovery-update-info:
    status: exempt
    comment: Cloud-polling integration; no local network discovery.
  discovery:
    status: exempt
    comment: Cloud-polling integration; no local network discovery.
  docs-data-update:
    status: todo
  docs-examples:
    status: todo
  docs-known-limitations:
    status: todo
  docs-supported-devices:
    status: todo
  docs-supported-functions:
    status: todo
  docs-troubleshooting:
    status: todo
  docs-use-cases:
    status: todo
  dynamic-devices:
    status: todo
  entity-category:
    status: todo
  entity-device-class:
    status: todo
  entity-disabled-by-default:
    status: todo
  entity-translations:
    status: todo
  exception-translations:
    status: todo
  icon-translations:
    status: todo
  reconfiguration-flow:
    status: todo
  repair-issues:
    status: done
    comment: Token refresh failure raises a HA repair (reauth) flow.
  stale-devices:
    status: todo

  # Platinum
  async-dependency:
    status: done
    comment: All I/O is async via aiohttp.
  inject-websession:
    status: todo
  strict-typing:
    status: todo
